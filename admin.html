<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYKYOU — 後台管理面板</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .admin-title h1 {
            margin: 0;
            font-size: 24px;
        }

        .admin-title p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }

        .btn-outline {
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(34, 197, 94, 0.05);
        }

        .btn-danger {
            border: 1px solid var(--danger);
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 14px;
            color: var(--text-muted);
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
            color: var(--primary);
        }

        .data-table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            text-align: left;
        }

        th {
            background-color: #f1f5f9;
            color: var(--text-main);
            font-weight: 600;
        }

        .post-preview {
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-user {
            background: #e0f2fe;
            color: #0369a1;
        }

        .badge-system {
            background: #f1f5f9;
            color: #475569;
        }

        .action-delete {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .action-delete:hover {
            text-decoration: underline;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-title">
                <h1>LYKYOU 後台管理終端</h1>
                <p>獨立頁面管理：即時移除、管控前端貼文數據</p>
            </div>
            <div>
                <a href="index.html" class="btn btn-outline">⬅️ 回到前台首頁</a>
                <button class="btn btn-danger" id="btn-purge" style="margin-left: 10px;">☢️ 清空全部數據</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">當前總貼文數</div>
                <div class="value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="label">使用者建立</div>
                <div class="value" id="stat-user" style="color: #0369a1;">0</div>
            </div>
            <div class="stat-card">
                <div class="label">系統預設貼文</div>
                <div class="value" id="stat-system" style="color: #475569;">0</div>
            </div>
        </div>

        <div class="data-table-container">
            <table>
                <thead>
                    <tr>
                        <th>發佈者</th>
                        <th>分類</th>
                        <th>內容摘要</th>
                        <th>按讚數</th>
                        <th>屬性</th>
                        <th>操作選項</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
            </table>
            <div id="empty-msg" class="empty-state" style="display: none;">目前資料庫中沒有任何貼文。</div>
        </div>
    </div>

    <script>
        // 預設與前台同步的 Key
        const STORAGE_KEY = 'echoes_posts';

        function loadAndRenderAdminData() {
            const tableBody = document.getElementById('admin-table-body');
            const emptyMsg = document.getElementById('empty-msg');
            let posts = [];

            try {
                const localData = localStorage.getItem(STORAGE_KEY);
                if (localData) posts = JSON.parse(localData);
            } catch (e) { console.error(e); }

            const systemCount = posts.filter(p => p.isDefault || p.id.toString().startsWith('def-')).length;
            const userCount = posts.length - systemCount;

            document.getElementById('stat-total').innerText = posts.length;
            document.getElementById('stat-user').innerText = userCount;
            document.getElementById('stat-system').innerText = systemCount;

            if (posts.length === 0) {
                tableBody.innerHTML = '';
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';
            tableBody.innerHTML = posts.map(post => {
                const isSystem = post.isDefault || post.id.toString().startsWith('def-');
                return `
          <tr>
            <td><strong>${escapeHTML(post.author || '匿名')}</strong><br><span style="font-size:12px;color:var(--text-muted);">${post.handle || ''}</span></td>
            <td><span style="background:#f1f5f9; padding:2px 6px; border-radius:4px; font-size:12px;">${post.category || 'Thoughts'}</span></td>
            <td><div class="post-preview">${escapeHTML(post.content || '')}</div></td>
            <td>❤️ ${post.likes || 0}</td>
            <td><span class="badge ${isSystem ? 'badge-system' : 'badge-user'}">${isSystem ? '預設常駐' : '用戶新增'}</span></td>
            <td><button class="action-delete" onclick="deletePostById('${post.id}')">🗑️ 強制刪除</button></td>
          </tr>
        `;
            }).join('');
        }

        window.deletePostById = function (id) {
            if (!confirm('確定要從資料庫完全刪除這篇貼文嗎？')) return;
            try {
                const localData = localStorage.getItem(STORAGE_KEY);
                if (localData) {
                    let posts = JSON.parse(localData);
                    posts = posts.filter(p => p.id.toString() !== id.toString());
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
                    loadAndRenderAdminData();
                }
            } catch (e) { alert('刪除失敗'); }
        };

        document.getElementById('btn-purge').addEventListener('click', () => {
            if (!confirm('警告！這將清除所有貼文數據。確定清空？')) return;
            localStorage.removeItem(STORAGE_KEY);
            loadAndRenderAdminData();
        });

        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        document.addEventListener('DOMContentLoaded', loadAndRenderAdminData);
    </script>
</body>

</html>
